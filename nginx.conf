server {
    listen 80;
    server_name wa.viviztech.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wa.viviztech.in;

    ssl_certificate     /etc/letsencrypt/live/wa.viviztech.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.viviztech.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:8003;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /static/ {
        alias /home/ubuntu/whatsapp-business/app/static/;
        expires 7d;
        add_header Cache-Control "public";
    }
}
