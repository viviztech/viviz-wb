<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — Viviz WhatsApp Business</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body class="h-full bg-gradient-to-br from-teal-900 via-teal-800 to-green-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex w-16 h-16 bg-green-400 rounded-full items-center justify-center mb-4">
        <i class="fas fa-lock text-white text-3xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">Change Password</h1>
      <p class="text-teal-200 text-sm mt-1">Please set a new secure password to continue</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8">
      {% if error %}
      <div class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      {% if success %}
      <div class="mb-4 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
        <i class="fas fa-check-circle"></i> {{ success }}
        <a href="/dashboard" class="ml-auto underline font-medium">Go to Dashboard</a>
      </div>
      {% endif %}

      <form method="POST" action="/change-password" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Current Password</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <i class="fas fa-lock text-sm"></i>
            </span>
            <input type="password" name="current_password" required placeholder="••••••••"
              class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <i class="fas fa-key text-sm"></i>
            </span>
            <input type="password" name="new_password" required placeholder="Min 8 chars, 1 uppercase, 1 number"
              class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"/>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Confirm New Password</label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
              <i class="fas fa-key text-sm"></i>
            </span>
            <input type="password" name="confirm_password" required placeholder="••••••••"
              class="w-full pl-9 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"/>
          </div>
        </div>

        <div class="bg-gray-50 rounded-lg p-3 text-xs text-gray-500 space-y-1">
          <p class="font-medium text-gray-600">Password requirements:</p>
          <p><i class="fas fa-check text-green-500 mr-1"></i> At least 8 characters</p>
          <p><i class="fas fa-check text-green-500 mr-1"></i> At least one uppercase letter</p>
          <p><i class="fas fa-check text-green-500 mr-1"></i> At least one number</p>
        </div>

        <button type="submit"
          class="w-full bg-teal-700 hover:bg-teal-800 text-white font-medium py-2.5 rounded-lg transition text-sm flex items-center justify-center gap-2">
          <i class="fas fa-save"></i> Update Password
        </button>
      </form>
    </div>
  </div>
</body>
</html>
